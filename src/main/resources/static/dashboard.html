<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - NutriSmart</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body { font-family: 'DM Sans', sans-serif; background: #f0fdf4; color: #1a3a2a; margin: 0; }

        .navbar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 2rem; height: 64px; background: #fff;
            border-bottom: 1px solid rgba(82,183,136,0.25);
            box-shadow: 0 2px 12px rgba(45,106,79,0.07);
            position: sticky; top: 0; z-index: 100;
        }
        .navbar-logo {
            display: flex; align-items: center; gap: 0.5rem;
            text-decoration: none; font-family: 'Playfair Display', serif;
            font-weight: 700; font-size: 1.25rem; color: #2D6A4F;
        }
        .navbar-menu { display: flex; align-items: center; gap: 0.75rem; }
        .navbar-name { font-size: 0.9rem; font-weight: 700; color: #2D6A4F; }
        .btn-nav {
            display: inline-flex; align-items: center; gap: 0.4rem;
            padding: 0.45rem 1rem; background: #f0fdf4;
            border: 2px solid #52B788; color: #2D6A4F;
            border-radius: 8px; font-size: 0.85rem; font-weight: 600;
            text-decoration: none; cursor: pointer; transition: all 0.2s;
            font-family: 'DM Sans', sans-serif;
        }
        .btn-nav:hover { background: #52B788; color: white; }
        .btn-sair {
            border: none; background: transparent; color: #dc2626;
            font-weight: 600; cursor: pointer; padding: 0.5rem 1rem;
            border-radius: 8px; font-size: 0.85rem;
            display: inline-flex; align-items: center; gap: 0.4rem;
            font-family: 'DM Sans', sans-serif;
        }
        .btn-sair:hover { background: #fee2e2; }

        .welcome-banner {
            background: linear-gradient(135deg, #2D6A4F 0%, #52B788 100%);
            padding: 2rem 2rem 1.8rem; color: white;
        }
        .welcome-title { font-family: 'Playfair Display', serif; font-size: 2rem; margin: 0; }
        .welcome-subtitle { margin-top: 0.4rem; opacity: 0.9; font-size: 0.95rem; }

        .container { max-width: 1100px; margin: 0 auto; padding: 2rem; }

        .metrics-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; margin-bottom: 2rem; }
        .metric-card {
            background: white; border-radius: 16px; padding: 1.5rem;
            border: 1px solid rgba(82,183,136,0.15);
            box-shadow: 0 2px 12px rgba(45,106,79,0.07);
        }
        .metric-value { font-size: 2.2rem; font-weight: 700; color: #2D6A4F; }
        .metric-label { color: #6b7280; font-size: 0.88rem; margin-top: 0.3rem; }

        .form-card {
            background: white; border-radius: 16px;
            border: 1px solid rgba(82,183,136,0.15);
            box-shadow: 0 2px 12px rgba(45,106,79,0.07);
            overflow: hidden; margin-bottom: 2rem;
        }
        .form-card-header { height: 5px; background: linear-gradient(90deg, #2D6A4F, #52B788); }
        .form-content { padding: 1.5rem; }
        .form-title {
            font-family: 'Playfair Display', serif; font-size: 1.35rem;
            color: #1a3a2a; margin-bottom: 1.2rem;
            display: flex; align-items: center; gap: 0.5rem;
        }
        .form-group { margin-bottom: 1rem; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .form-label {
            display: block; margin-bottom: 0.4rem; font-size: 0.78rem;
            font-weight: 700; color: #374151; text-transform: uppercase; letter-spacing: 0.04em;
        }
        .form-input {
            width: 100%; padding: 0.75rem; border: 2px solid #e5e7eb;
            border-radius: 8px; font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem; outline: none; transition: border-color 0.2s;
        }
        .form-input:focus { border-color: #52B788; }
        .btn-submit {
            width: 100%; padding: 0.85rem; border: none; border-radius: 8px;
            background: linear-gradient(135deg, #2D6A4F, #52B788);
            color: white; font-weight: 700; cursor: pointer; font-size: 0.95rem;
            font-family: 'DM Sans', sans-serif;
            display: flex; align-items: center; justify-content: center; gap: 0.5rem;
            transition: opacity 0.2s;
        }
        .btn-submit:hover { opacity: 0.92; }
        .msg-erro {
            display: none; margin-top: 1rem; background: #fee2e2;
            color: #991b1b; padding: 0.8rem 1rem; border-radius: 8px;
            font-weight: 600; font-size: 0.88rem;
        }
        .msg-erro.show { display: block; }
        .imc-result {
            display: none; margin-top: 1rem; background: #f0fdf4;
            border: 1px solid #86efac; padding: 1rem; border-radius: 10px; text-align: center;
        }
        .imc-result.show { display: block; }
        .imc-value { font-size: 2rem; font-weight: 700; color: #2D6A4F; }

        .section {
            background: white; border-radius: 16px;
            border: 1px solid rgba(82,183,136,0.15);
            box-shadow: 0 2px 12px rgba(45,106,79,0.07); overflow: hidden;
        }
        .section-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1.3rem 1.5rem; border-bottom: 1px solid #f0fdf4; flex-wrap: wrap; gap: 1rem;
        }
        .section-title {
            font-family: 'Playfair Display', serif; font-size: 1.25rem;
            color: #1a3a2a; display: flex; align-items: center; gap: 0.5rem;
        }
        .search-wrap { position: relative; display: flex; align-items: center; }
        .search-icon { position: absolute; left: 0.85rem; color: #9ca3af; font-size: 0.85rem; pointer-events: none; }
        .search-input {
            padding: 0.65rem 1rem 0.65rem 2.4rem; border: 2px solid #e5e7eb;
            border-radius: 10px; font-family: 'DM Sans', sans-serif;
            font-size: 0.88rem; outline: none; width: 260px; transition: border-color 0.2s;
        }
        .search-input:focus { border-color: #52B788; }
        .count-badge {
            background: #d1fae5; color: #065f46; padding: 0.25rem 0.75rem;
            border-radius: 999px; font-size: 0.78rem; font-weight: 700;
        }

        .patients-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
            gap: 1rem; padding: 1.5rem;
        }
        .patient-card {
            border: 1px solid rgba(82,183,136,0.2); border-radius: 14px;
            padding: 1.2rem; text-align: center; transition: 0.2s; background: #fff;
        }
        .patient-card:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(45,106,79,0.12); }
        .patient-avatar {
            width: 56px; height: 56px; border-radius: 50%; background: #f0fdf4;
            display: flex; align-items: center; justify-content: center; margin: 0 auto 0.9rem;
        }
        .patient-name { font-weight: 700; color: #1a3a2a; margin-bottom: 0.4rem; font-size: 0.95rem; }
        .patient-imc { color: #6b7280; font-size: 0.85rem; margin-bottom: 0.6rem; }
        .patient-status {
            display: inline-block; padding: 0.22rem 0.65rem; border-radius: 999px;
            background: #d1fae5; color: #065f46; font-size: 0.72rem; font-weight: 700; margin-bottom: 0.9rem;
        }
        .btn-details {
            width: 100%; padding: 0.58rem; border: 2px solid #52B788;
            background: transparent; color: #2D6A4F; border-radius: 8px;
            font-weight: 700; font-size: 0.85rem; cursor: pointer; transition: 0.2s;
            font-family: 'DM Sans', sans-serif;
        }
        .btn-details:hover { background: #52B788; color: white; }
        .empty-grid { padding: 2.5rem; color: #6b7280; text-align: center; grid-column: 1 / -1; }

        @media(max-width: 768px) {
            .metrics-grid, .form-row { grid-template-columns: 1fr; }
            .navbar { padding: 0 1rem; }
            .container { padding: 1rem; }
            .section-header { flex-direction: column; align-items: stretch; }
            .search-input { width: 100%; }
            .search-wrap { width: 100%; }
        }
    </style>
</head>
<body>

<script>
    (function () {
        const tipo = localStorage.getItem("tipoUsuario");
        if (!tipo) window.location.href = "/login.html";
        else if (tipo !== "NUTRICIONISTA") window.location.href = "/home_paciente.html";
    })();
</script>

<nav class="navbar">
    <a href="/index.html" class="navbar-logo">
        <svg width="26" height="26" viewBox="0 0 32 32" fill="none">
            <path d="M16 2C16 2 8 6 8 16C8 20 10 24 16 28C22 24 24 20 24 16C24 6 16 2 16 2Z" fill="#52B788"/>
            <path d="M16 8C13 10 12 13 12 16C12 18 13 20 16 22C19 20 20 18 20 16C20 13 19 10 16 8Z" fill="#2D6A4F"/>
        </svg>
        NutriSmart
    </a>
    <div class="navbar-menu">
        <a href="/consultas_nutricionista.html" class="btn-nav">
            <i class="fa-solid fa-calendar-days"></i> Consultas
        </a>
        <a href="/dietas.html" class="btn-nav">
            <i class="fa-solid fa-utensils"></i> Dietas
        </a>
        <span class="navbar-name" id="nomeNutri"></span>
        <button class="btn-sair" onclick="logout()">
            <i class="fa-solid fa-right-from-bracket"></i> Sair
        </button>
    </div>
</nav>

<div class="welcome-banner">
    <h1 class="welcome-title" id="boasVindas">Olá, Nutricionista 👋</h1>
    <p class="welcome-subtitle">Gerencie seus pacientes de forma inteligente.</p>
</div>

<div class="container">

    <div class="metrics-grid">
        <div class="metric-card">
            <div class="metric-value" id="totalPacientes">0</div>
            <div class="metric-label">Total de Pacientes</div>
        </div>
        <div class="metric-card">
            <div class="metric-value" id="pacientesAtivos">0</div>
            <div class="metric-label">Pacientes Ativos</div>
        </div>
    </div>

    <div class="form-card">
        <div class="form-card-header"></div>
        <div class="form-content">
            <h2 class="form-title">
                <i class="fa-solid fa-user-plus" style="color:#52B788"></i>
                Cadastrar Novo Paciente
            </h2>

            <div class="form-group">
                <label class="form-label">Nome Completo *</label>
                <input type="text" class="form-input" id="p-nome" placeholder="Nome completo do paciente">
            </div>

            <div class="form-group">
                <label class="form-label">E-mail do Paciente *</label>
                <input type="email" class="form-input" id="p-email" placeholder="email@exemplo.com">
                <small style="color:#6b7280;font-size:0.78rem;margin-top:0.3rem;display:block">
                    <i class="fa-solid fa-circle-info"></i>
                    Use o mesmo e-mail que o paciente usa para fazer login no app.
                </small>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Idade *</label>
                    <input type="number" class="form-input" id="p-idade" placeholder="25" min="1" max="120">
                </div>
                <div class="form-group">
                    <label class="form-label">Sexo *</label>
                    <select class="form-input" id="p-sexo">
                        <option value="">Selecione</option>
                        <option>Feminino</option>
                        <option>Masculino</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Peso (kg) *</label>
                    <input type="number" class="form-input" id="p-peso" step="0.1" placeholder="70.0">
                </div>
                <div class="form-group">
                    <label class="form-label">Altura (m) *</label>
                    <input type="number" class="form-input" id="p-altura" step="0.01" placeholder="1.75">
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Objetivo</label>
                <select class="form-input" id="p-objetivo">
                    <option value="">Selecione</option>
                    <option>Emagrecimento</option>
                    <option>Hipertrofia</option>
                    <option>Manutenção</option>
                    <option>Reeducação alimentar</option>
                </select>
            </div>

            <div class="form-group">
                <label class="form-label">Restrições Alimentares</label>
                <input type="text" class="form-input" id="p-restricoes" placeholder="Ex: lactose, glúten...">
            </div>

            <div class="form-group">
                <label class="form-label">Observações</label>
                <textarea class="form-input" id="p-observacoes" rows="3" placeholder="Informações adicionais"></textarea>
            </div>

            <button class="btn-submit" onclick="salvarPaciente()">
                <i class="fa-solid fa-user-plus"></i> Cadastrar Paciente
            </button>

            <div id="erroPaciente" class="msg-erro">
                <i class="fa-solid fa-circle-exclamation"></i>
                <span id="erroPacienteTexto"></span>
            </div>

            <div id="imcResult" class="imc-result">
                <div style="font-size:.85rem;color:#6b7280;margin-bottom:.3rem">IMC Calculado</div>
                <div class="imc-value" id="imcValue">0.0</div>
                <div id="imcClass" style="color:#2D6A4F;font-weight:600;margin-top:.3rem"></div>
            </div>
        </div>
    </div>

    <div class="section">
        <div class="section-header">
            <h2 class="section-title">
                <i class="fa-solid fa-users" style="color:#52B788"></i>
                Meus Pacientes
            </h2>
            <div style="display:flex;align-items:center;gap:0.75rem;flex-wrap:wrap;">
                <div class="search-wrap">
                    <i class="fa-solid fa-magnifying-glass search-icon"></i>
                    <input type="text" id="buscarPaciente" class="search-input"
                           placeholder="Buscar paciente..." oninput="filtrarPacientes()">
                </div>
                <span class="count-badge" id="countPacientes"></span>
            </div>
        </div>
        <div class="patients-grid" id="gridPacientes">
            <div class="empty-grid">
                <i class="fa-solid fa-circle-notch fa-spin" style="color:#52B788;margin-right:.5rem"></i>
                Carregando pacientes...
            </div>
        </div>
    </div>

</div>

<script>
    const nomeUsuario = localStorage.getItem("nomeUsuario") || "Nutricionista";
    document.getElementById("nomeNutri").innerText = nomeUsuario;
    document.getElementById("boasVindas").innerText = `Olá, ${nomeUsuario} 👋`;

    let todosPacientes = [];

    async function carregarPacientes() {
        try {
            const res = await fetch('/pacientes');
            const pacientes = await res.json();
            const mapa = new Map();
            pacientes.forEach(p => mapa.set(p.id, p));
            todosPacientes = Array.from(mapa.values());
            atualizarContadores(todosPacientes.length);
            renderizarPacientes(todosPacientes);
        } catch(e) {
            document.getElementById("gridPacientes").innerHTML =
                `<div class="empty-grid" style="color:#dc2626">Erro ao carregar pacientes.</div>`;
        }
    }

    function atualizarContadores(total) {
        document.getElementById("totalPacientes").innerText = total;
        document.getElementById("pacientesAtivos").innerText = total;
        document.getElementById("countPacientes").innerText =
            `${total} paciente${total !== 1 ? 's' : ''}`;
    }

    function renderizarPacientes(lista) {
        const grid = document.getElementById("gridPacientes");
        if (!lista.length) {
            grid.innerHTML = `<div class="empty-grid">Nenhum paciente encontrado.</div>`;
            return;
        }
        grid.innerHTML = lista.map(p => `
            <div class="patient-card">
                <div class="patient-avatar">
                    <i class="fa-solid fa-user" style="color:#2D6A4F;font-size:1.3rem"></i>
                </div>
                <h3 class="patient-name">${p.nome}</h3>
                <div class="patient-imc">IMC: <strong>${p.imc ? Number(p.imc).toFixed(1) : '—'}</strong></div>
                <div class="patient-status">${p.objetivo || 'Paciente ativo'}</div>
                <button class="btn-details" onclick="abrirPaciente(${p.id})">
                    <i class="fa-solid fa-eye"></i> Ver Detalhes
                </button>
            </div>
        `).join('');
    }

    function filtrarPacientes() {
        const termo = document.getElementById("buscarPaciente").value.toLowerCase().trim();
        const filtrados = todosPacientes.filter(p => p.nome.toLowerCase().includes(termo));
        renderizarPacientes(filtrados);
        document.getElementById("countPacientes").innerText =
            `${filtrados.length} paciente${filtrados.length !== 1 ? 's' : ''}`;
    }

    function abrirPaciente(id) {
        localStorage.setItem("pacienteSelecionado", id);
        window.location.href = "/paciente_detalhes.html";
    }

    async function salvarPaciente() {
        const errDiv = document.getElementById('erroPaciente');
        const errTxt = document.getElementById('erroPacienteTexto');
        const imcDiv = document.getElementById('imcResult');
        errDiv.classList.remove('show');
        imcDiv.classList.remove('show');

        const dados = {
            nome:        document.getElementById('p-nome').value.trim(),
            email:       document.getElementById('p-email').value.trim().toLowerCase(),
            idade:       parseInt(document.getElementById('p-idade').value),
            sexo:        document.getElementById('p-sexo').value,
            peso:        parseFloat(document.getElementById('p-peso').value),
            altura:      parseFloat(document.getElementById('p-altura').value),
            objetivo:    document.getElementById('p-objetivo').value,
            restricoes:  document.getElementById('p-restricoes').value,
            observacoes: document.getElementById('p-observacoes').value
        };

        if (!dados.nome || !dados.email || !dados.idade || !dados.sexo || isNaN(dados.peso) || isNaN(dados.altura)) {
            errTxt.innerText = 'Preencha todos os campos obrigatórios (*)';
            errDiv.classList.add('show');
            return;
        }

        try {
            const res = await fetch('/pacientes', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(dados)
            });
            const data = await res.json();

            if (!res.ok) {
                errTxt.innerText = data.erro || 'Erro ao cadastrar paciente.';
                errDiv.classList.add('show');
                return;
            }

            document.getElementById('imcValue').innerText = Number(data.imc).toFixed(1);
            document.getElementById('imcClass').innerText = '✅ Paciente cadastrado com sucesso!';
            imcDiv.classList.add('show');

            ['p-nome','p-email','p-idade','p-sexo','p-peso','p-altura','p-objetivo','p-restricoes','p-observacoes']
                .forEach(id => document.getElementById(id).value = '');

            carregarPacientes();

        } catch(e) {
            errTxt.innerText = 'Erro de conexão com o servidor.';
            errDiv.classList.add('show');
        }
    }

    function logout() {
        localStorage.clear();
        window.location.href = '/login.html';
    }

    carregarPacientes();
</script>
</body>
</html>
