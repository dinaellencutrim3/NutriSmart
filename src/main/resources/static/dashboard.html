<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - NutriSmart</title>
    <link rel="stylesheet" href="/css/style_nutrismart.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .search-wrap { position:relative; }
        .search-icon { position:absolute; left:.9rem; top:50%; transform:translateY(-50%); color:#9ca3af; font-size:.85rem; }
        .search-input { padding:.65rem 1rem .65rem 2.4rem; border:2px solid #e5e7eb; border-radius:10px; font-family:'DM Sans',sans-serif; font-size:.88rem; outline:none; width:260px; }
        .search-input:focus { border-color:var(--verde-claro); }
        .count-badge { background:#d1fae5; color:#065f46; padding:.25rem .75rem; border-radius:999px; font-size:.78rem; font-weight:700; }
        .patients-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:1.5rem; padding:1.5rem; }
        .patient-card { background:var(--fundo); border-radius:var(--border-radius); border:1px solid #e5e7eb; padding:1.5rem; text-align:center; transition:.2s; }
        .patient-card:hover { box-shadow:var(--sombra); transform:translateY(-2px); }
        .patient-avatar { width:56px; height:56px; background:linear-gradient(135deg,var(--verde-medio),var(--verde-claro)); border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto .9rem; color:#fff; font-size:1.3rem; }
        .patient-name { font-weight:700; color:#1a3a2a; margin-bottom:.4rem; }
        .patient-imc { font-size:.85rem; color:var(--cinza-texto); margin-bottom:.5rem; }
        .patient-status { display:inline-block; padding:.22rem .65rem; border-radius:999px; background:#d1fae5; color:#065f46; font-size:.72rem; font-weight:700; margin-bottom:.9rem; }
        .section-header { display:flex; justify-content:space-between; align-items:center; padding:1.3rem 1.5rem; border-bottom:1px solid #f0fdf4; flex-wrap:wrap; gap:1rem; }
        .section-title { font-family:'Playfair Display',serif; font-size:1.25rem; color:#1a3a2a; }
        .msg-erro { display:none; margin-top:1rem; background:#fee2e2; color:#991b1b; padding:.8rem 1rem; border-radius:8px; font-weight:600; font-size:.88rem; }
        .msg-erro.show { display:block; }
        .imc-result { display:none; margin-top:1rem; background:#f0fdf4; border:1px solid #86efac; padding:1rem; border-radius:10px; text-align:center; }
        .imc-result.show { display:block; }
        .imc-val { font-size:2rem; font-weight:700; color:var(--verde-escuro); }
        .section-box { background:#fff; border-radius:var(--border-radius); box-shadow:var(--sombra); overflow:hidden; margin-bottom:2rem; }
    </style>
</head>
<body>

<script>
    (function(){
        const tipo = localStorage.getItem("tipoUsuario");
        if(!tipo) window.location.href="/login.html";
        else if(tipo !== "NUTRICIONISTA") window.location.href="/home_paciente.html";
    })();
</script>

<nav class="navbar">
    <div class="navbar-logo">
        <svg width="28" height="28" viewBox="0 0 32 32" fill="none" style="margin-right:.4rem">
            <path d="M16 2C16 2 8 6 8 16C8 20 10 24 16 28C22 24 24 20 24 16C24 6 16 2 16 2Z" fill="#52B788"/>
            <path d="M16 8C13 10 12 13 12 16C12 18 13 20 16 22C19 20 20 18 20 16C20 13 19 10 16 8Z" fill="#2D6A4F"/>
        </svg>
        NutriSmart
    </div>
    <div class="navbar-menu">
        <a href="/consultas_nutricionista.html" class="navbar-btn"><i class="fa-solid fa-calendar-days"></i> Consultas</a>
        <div class="navbar-user" id="nomeNutri" style="display:flex;align-items:center;gap:.4rem">
            <i class="fa-solid fa-user-nurse" style="color:#52B788"></i>
            <span id="nomeNutriTexto"></span>
        </div>
        <button onclick="logout()" class="btn btn-danger" style="padding:.5rem 1rem;font-size:.85rem">
            <i class="fa-solid fa-right-from-bracket"></i> Sair
        </button>
    </div>
</nav>

<div class="banner" style="border-radius:0;margin:0">
    <h1 id="boasVindas">Olá, Nutricionista 👋</h1>
    <p>Gerencie seus pacientes de forma inteligente.</p>
</div>

<div class="container" style="padding-top:2rem">



    <!-- FORM CADASTRO -->
    <div class="card" style="margin-bottom:2rem">
        <h2 style="color:var(--verde-escuro);margin-bottom:1.5rem">
            <i class="fa-solid fa-user-plus" style="color:var(--verde-claro)"></i> Cadastrar Novo Paciente
        </h2>

        <div class="grid grid-2">
            <div class="form-group">
                <label class="form-label">Nome Completo *</label>
                <input type="text" class="form-input" id="p-nome" placeholder="Nome completo do paciente">
            </div>
            <div class="form-group">
                <label class="form-label">E-mail do Paciente *</label>
                <input type="email" class="form-input" id="p-email" placeholder="email@exemplo.com">
                <small style="color:var(--cinza-texto);font-size:.78rem;margin-top:.3rem;display:block">
                    <i class="fa-solid fa-circle-info"></i> Use o mesmo e-mail que o paciente usa para fazer login.
                </small>
            </div>
        </div>

        <div class="grid grid-4">
            <div class="form-group">
                <label class="form-label">Idade *</label>
                <input type="number" class="form-input" id="p-idade" placeholder="25" min="1" max="120">
            </div>
            <div class="form-group">
                <label class="form-label">Sexo *</label>
                <select class="form-select" id="p-sexo">
                    <option value="">Selecione</option>
                    <option>Feminino</option>
                    <option>Masculino</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Peso (kg) *</label>
                <input type="number" class="form-input" id="p-peso" step="0.1" placeholder="70.0">
            </div>
            <div class="form-group">
                <label class="form-label">Altura (m) *</label>
                <input type="number" class="form-input" id="p-altura" step="0.01" placeholder="1.75">
            </div>
        </div>

        <div class="grid grid-2">
            <div class="form-group">
                <label class="form-label">Objetivo</label>
                <select class="form-select" id="p-objetivo">
                    <option value="">Selecione</option>
                    <option>Emagrecimento</option>
                    <option>Hipertrofia</option>
                    <option>Manutenção</option>
                    <option>Reeducação alimentar</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Restrições Alimentares</label>
                <input type="text" class="form-input" id="p-restricoes" placeholder="Ex: lactose, glúten...">
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">Observações</label>
            <textarea class="form-textarea" id="p-observacoes" placeholder="Informações adicionais" style="min-height:80px"></textarea>
        </div>

        <button class="btn btn-primary" onclick="salvarPaciente()" style="width:100%;font-size:1rem">
            <i class="fa-solid fa-user-plus"></i> Cadastrar Paciente
        </button>

        <div id="erroPaciente" class="msg-erro"><span id="erroPacienteTexto"></span></div>
        <div id="imcResult" class="imc-result">
            <div style="font-size:.85rem;color:var(--cinza-texto);margin-bottom:.3rem">IMC Calculado</div>
            <div class="imc-val" id="imcValue">0.0</div>
            <div id="imcClass" style="color:var(--verde-medio);font-weight:600;margin-top:.3rem"></div>
        </div>
    </div>

    <!-- LISTA PACIENTES -->
    <div class="section-box">
        <div class="section-header">
      <span class="section-title">
        <i class="fa-solid fa-users" style="color:var(--verde-claro)"></i> Meus Pacientes
      </span>
            <div style="display:flex;align-items:center;gap:.75rem;flex-wrap:wrap">
                <div class="search-wrap">
                    <i class="fa-solid fa-magnifying-glass search-icon"></i>
                    <input type="text" id="buscarPaciente" class="search-input"
                           placeholder="Buscar paciente..." oninput="filtrarPacientes()">
                </div>
                <span class="count-badge" id="countPacientes"></span>
            </div>
        </div>
        <div class="patients-grid" id="gridPacientes">
            <div style="padding:2rem;color:var(--cinza-texto);grid-column:1/-1;text-align:center">
                <i class="fa-solid fa-circle-notch fa-spin" style="color:var(--verde-claro);margin-right:.5rem"></i>
                Carregando pacientes...
            </div>
        </div>
    </div>

</div>

<script>
    const nomeUsuario = localStorage.getItem("nomeUsuario") || "Nutricionista";
    document.getElementById("nomeNutriTexto").innerText = nomeUsuario;
    document.getElementById("boasVindas").innerText = `Olá, ${nomeUsuario} 👋`;

    let todosPacientes = [];

    async function carregarPacientes() {
        try {
            const res = await fetch('/pacientes');
            const pacientes = await res.json();
            const mapa = new Map();
            pacientes.forEach(p => mapa.set(p.id, p));
            todosPacientes = Array.from(mapa.values());

            document.getElementById("countPacientes").innerText =
                `${todosPacientes.length} paciente${todosPacientes.length !== 1 ? 's' : ''}`;
            renderizarPacientes(todosPacientes);
        } catch(e) {
            document.getElementById("gridPacientes").innerHTML =
                `<div style="padding:2rem;color:#dc2626;grid-column:1/-1;text-align:center">Erro ao carregar pacientes.</div>`;
        }
    }

    function renderizarPacientes(lista) {
        const grid = document.getElementById("gridPacientes");
        if (!lista.length) {
            grid.innerHTML = `<div style="padding:2rem;color:var(--cinza-texto);grid-column:1/-1;text-align:center">Nenhum paciente encontrado.</div>`;
            return;
        }
        grid.innerHTML = lista.map(p => {
            const iniciais = p.nome.split(' ').map(n=>n[0]).slice(0,2).join('').toUpperCase();
            return `
      <div class="patient-card">
        <div class="patient-avatar">${iniciais}</div>
        <h3 class="patient-name">${p.nome}</h3>
        <div class="patient-imc">IMC: <strong>${p.imc ? Number(p.imc).toFixed(1) : '—'}</strong></div>
        <div class="patient-status">${p.objetivo || 'Paciente ativo'}</div>
        <button class="btn btn-primary" style="width:100%;font-size:.85rem" onclick="abrirPaciente(${p.id})">
          <i class="fa-solid fa-eye"></i> Ver Detalhes
        </button>
      </div>`;
        }).join('');
    }

    function filtrarPacientes() {
        const termo = document.getElementById("buscarPaciente").value.toLowerCase().trim();
        const filtrados = todosPacientes.filter(p => p.nome.toLowerCase().includes(termo));
        renderizarPacientes(filtrados);
        document.getElementById("countPacientes").innerText =
            `${filtrados.length} paciente${filtrados.length !== 1 ? 's' : ''}`;
    }

    function abrirPaciente(id) {
        localStorage.setItem("pacienteSelecionado", id);
        window.location.href = "/paciente_detalhes.html";
    }

    async function salvarPaciente() {
        const errDiv = document.getElementById('erroPaciente');
        const errTxt = document.getElementById('erroPacienteTexto');
        const imcDiv = document.getElementById('imcResult');
        errDiv.classList.remove('show');
        imcDiv.classList.remove('show');

        const dados = {
            nome:        document.getElementById('p-nome').value.trim(),
            email:       document.getElementById('p-email').value.trim().toLowerCase(),
            idade:       parseInt(document.getElementById('p-idade').value),
            sexo:        document.getElementById('p-sexo').value,
            peso:        parseFloat(document.getElementById('p-peso').value),
            altura:      parseFloat(document.getElementById('p-altura').value),
            objetivo:    document.getElementById('p-objetivo').value,
            restricoes:  document.getElementById('p-restricoes').value,
            observacoes: document.getElementById('p-observacoes').value
        };

        if (!dados.nome || !dados.email || !dados.idade || !dados.sexo || isNaN(dados.peso) || isNaN(dados.altura)) {
            errTxt.innerText = 'Preencha todos os campos obrigatórios (*)';
            errDiv.classList.add('show'); return;
        }

        try {
            const res = await fetch('/pacientes', {
                method:'POST', headers:{'Content-Type':'application/json'},
                body: JSON.stringify(dados)
            });
            const data = await res.json();
            if (!res.ok) { errTxt.innerText = data.erro || 'Erro ao cadastrar.'; errDiv.classList.add('show'); return; }
            document.getElementById('imcValue').innerText = Number(data.imc).toFixed(1);
            document.getElementById('imcClass').innerText = '✅ Paciente cadastrado com sucesso!';
            imcDiv.classList.add('show');
            ['p-nome','p-email','p-idade','p-sexo','p-peso','p-altura','p-objetivo','p-restricoes','p-observacoes']
                .forEach(id => document.getElementById(id).value = '');
            carregarPacientes();
        } catch(e) {
            errTxt.innerText = 'Erro de conexão com o servidor.';
            errDiv.classList.add('show');
        }
    }

    function logout() { localStorage.clear(); window.location.href='/login.html'; }
    carregarPacientes();
</script>
</body>
</html>
