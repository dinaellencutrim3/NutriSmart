<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Área - NutriSmart</title>
    <link rel="stylesheet" href="/css/style_nutrismart.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        .tab-content { display:none; }
        .tab-content.active { display:block; }
        .hist-card { background:#fff; border-radius:14px; padding:1rem 1.2rem; border-left:4px solid #e5e7eb; box-shadow:0 2px 8px rgba(27,67,50,0.05); margin-bottom:.75rem; }
        .hist-card.pendente { border-left-color:#f59e0b; }
        .hist-card.aceita   { border-left-color:#22c55e; }
        .hist-card.recusada { border-left-color:#ef4444; }
        .hist-card.sugerido { border-left-color:#8b5cf6; }
        .badge-status { padding:.22rem .7rem; border-radius:999px; font-size:.72rem; font-weight:700; }
        .badge-status.pendente { background:#fef3c7; color:#d97706; }
        .badge-status.aceita   { background:#dcfce7; color:#16a34a; }
        .badge-status.recusada { background:#fee2e2; color:#dc2626; }
        .badge-status.sugerido { background:#ede9fe; color:#7c3aed; }
        .sug-box { background:#ede9fe; border-radius:8px; padding:.55rem .9rem; margin-top:.5rem; font-size:.8rem; color:#5b21b6; font-weight:600; }
        .sug-btns { display:flex; gap:.5rem; margin-top:.4rem; }
        .btn-sim { background:#22c55e; color:#fff; border:none; padding:.35rem .8rem; border-radius:7px; font-weight:700; font-size:.78rem; cursor:pointer; }
        .btn-nao { background:#fee2e2; color:#dc2626; border:none; padding:.35rem .8rem; border-radius:7px; font-weight:700; font-size:.78rem; cursor:pointer; }
        /* Chat slide-up */
        .chat-overlay { position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:500; display:none; align-items:flex-end; justify-content:center; }
        .chat-overlay.open { display:flex; }
        .chat-box { background:#fff; width:100%; max-width:520px; max-height:85vh; display:flex; flex-direction:column; border-radius:20px 20px 0 0; box-shadow:0 -8px 40px rgba(0,0,0,.15); animation:slideUp .3s ease; }
        @keyframes slideUp { from{transform:translateY(40px);opacity:0} to{transform:translateY(0);opacity:1} }
        .chat-head { padding:1rem 1.3rem; background:linear-gradient(135deg,#1B4332,#52B788); border-radius:20px 20px 0 0; display:flex; align-items:center; justify-content:space-between; color:#fff; }
        .chat-head-left { display:flex; align-items:center; gap:.65rem; }
        .chat-av { width:38px; height:38px; background:rgba(255,255,255,.2); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.1rem; }
        .chat-close { background:rgba(255,255,255,.2); border:none; color:#fff; width:30px; height:30px; border-radius:50%; font-size:1rem; cursor:pointer; display:flex; align-items:center; justify-content:center; }
        .chat-ctx { padding:.5rem 1.2rem; background:#f0fdf4; border-bottom:1px solid #dcfce7; font-size:.78rem; color:#2D6A4F; font-weight:600; }
        .chat-msgs { flex:1; overflow-y:auto; padding:1rem 1.2rem; display:flex; flex-direction:column; gap:.75rem; }
        .msg { max-width:80%; padding:.7rem 1rem; border-radius:14px; font-size:.86rem; line-height:1.55; white-space:pre-wrap; }
        .msg-bot  { background:#e9f7ef; color:#1a3a2a; border-radius:4px 14px 14px 14px; align-self:flex-start; }
        .msg-user { background:linear-gradient(135deg,#2D6A4F,#52B788); color:#fff; border-radius:14px 4px 14px 14px; align-self:flex-end; }
        .msg-load { background:#e9f7ef; color:#6b7280; border-radius:4px 14px 14px 14px; align-self:flex-start; font-style:italic; font-size:.82rem; }
        .chat-input-area { padding:.9rem 1.2rem; border-top:1px solid #e5e7eb; display:flex; gap:.6rem; }
        .chat-input { flex:1; padding:.7rem 1rem; border:2px solid #e5e7eb; border-radius:10px; font-family:'DM Sans',sans-serif; font-size:.88rem; outline:none; resize:none; }
        .chat-input:focus { border-color:#52B788; }
        .chat-send { background:linear-gradient(135deg,#2D6A4F,#52B788); color:#fff; border:none; border-radius:10px; padding:.7rem 1rem; cursor:pointer; font-weight:700; }
        @keyframes spin { to{transform:rotate(360deg)} }
        .spinner { display:inline-block; width:16px; height:16px; border:2px solid rgba(82,183,136,0.3); border-top-color:#52B788; border-radius:50%; animation:spin .8s linear infinite; vertical-align:middle; margin-right:.4rem; }
    </style>
</head>
<body>

<script>
    (function(){
        const tipo = localStorage.getItem("tipoUsuario");
        if(!tipo) window.location.href="/login.html";
        else if(tipo !== "PACIENTE") window.location.href="/dashboard.html";
    })();
</script>

<nav class="navbar">
    <div class="navbar-logo">
        <svg width="24" height="24" viewBox="0 0 32 32" fill="none" style="margin-right:.4rem">
            <path d="M16 2C16 2 8 6 8 16C8 20 10 24 16 28C22 24 24 20 24 16C24 6 16 2 16 2Z" fill="#52B788"/>
            <path d="M16 8C13 10 12 13 12 16C12 18 13 20 16 22C19 20 20 18 20 16C20 13 19 10 16 8Z" fill="#2D6A4F"/>
        </svg>
        NutriSmart
    </div>
    <div class="navbar-menu">
        <div class="navbar-user" id="nomeExibido"></div>
        <button onclick="logout()" class="btn btn-danger" style="padding:.5rem 1rem;font-size:.85rem">&#x2192; Sair</button>
    </div>
</nav>

<div class="banner" style="border-radius:0;margin:0;padding-bottom:0">
    <h1 id="boasVindas">Olá, Paciente 👋</h1>
    <p>Acompanhe sua alimentação e consultas.</p>
    <div class="tabs" style="border-bottom:none;margin-bottom:0;padding-top:1.5rem">
        <button class="tab active" onclick="switchTab('dieta',this)">🥗 Minha Dieta</button>
        <button class="tab" onclick="switchTab('consultas',this)">📅 Consultas</button>
    </div>
</div>

<div class="container" style="padding-top:2rem">

    <!-- ABA DIETA -->
    <div id="tab-dieta" class="tab-content active">
        <div id="dietaContainer">
            <div style="text-align:center;padding:3rem;color:#6b7280">
                <span class="spinner"></span> Carregando sua dieta...
            </div>
        </div>
    </div>

    <!-- ABA CONSULTAS -->
    <div id="tab-consultas" class="tab-content">
        <div class="card" style="margin-bottom:2rem">
            <h2 style="color:var(--verde-escuro);margin-bottom:1.5rem">📅 Solicitar Consulta</h2>
            <div class="grid grid-2">
                <div class="form-group">
                    <label class="form-label">Data Preferida</label>
                    <input type="date" class="form-input" id="dataConsulta">
                </div>
                <div class="form-group">
                    <label class="form-label">Horário</label>
                    <input type="time" class="form-input" id="horarioConsulta">
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Tipo de Consulta</label>
                <select class="form-select" id="tipoConsulta">
                    <option value="">Selecione</option>
                    <option>Primeira Consulta</option>
                    <option>Retorno</option>
                    <option>Avaliação Nutricional</option>
                    <option>Acompanhamento Mensal</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Observações (opcional)</label>
                <textarea class="form-textarea" id="obsConsulta" placeholder="Ex: Prefiro horário à tarde..." style="min-height:80px"></textarea>
            </div>
            <button class="btn btn-primary" onclick="solicitarConsulta()" style="width:100%">
                &#x27A4; Enviar Solicitação
            </button>
        </div>

        <h3 style="color:var(--verde-escuro);margin-bottom:1rem">🕐 Minhas Solicitações</h3>
        <div id="historicoConsultas"></div>
    </div>

</div>

<!-- CHATBOT -->
<div class="chat-overlay" id="chatOverlay" onclick="fecharChatFora(event)">
    <div class="chat-box">
        <div class="chat-head">
            <div class="chat-head-left">
                <div class="chat-av">🤖</div>
                <div>
                    <div style="font-weight:700;font-size:.95rem">NutriBot</div>
                    <div style="font-size:.75rem;opacity:.85">Assistente de substituição alimentar</div>
                </div>
            </div>
            <button class="chat-close" onclick="fecharChat()">✕</button>
        </div>
        <div class="chat-ctx" id="chatCtx"></div>
        <div class="chat-msgs" id="chatMsgs"></div>
        <div class="chat-input-area">
      <textarea class="chat-input" id="chatInput" rows="1"
                placeholder="Ex: Não gosto de frango, pode sugerir outra proteína?"
                onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();enviarMsg();}"></textarea>
            <button class="chat-send" onclick="enviarMsg()">&#x27A4;</button>
        </div>
    </div>
</div>

<script>
    const pacienteNome = localStorage.getItem("nomeUsuario") || "Paciente";
    const pacienteId   = (localStorage.getItem("usuarioId") || "").split(':')[0];
    const emailLogin   = localStorage.getItem("emailUsuario") || "";
    let chatCtx = null, chatHist = [];

    document.getElementById("nomeExibido").innerText = pacienteNome;
    document.getElementById("boasVindas").innerText  = `Olá, ${pacienteNome} 👋`;

    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('dataConsulta').min = new Date().toISOString().split('T')[0];
        carregarDieta();
        renderHistorico();
    });

    function switchTab(nome, btn) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-' + nome).classList.add('active');
        btn.classList.add('active');
    }

    async function carregarDieta() {
        const c = document.getElementById("dietaContainer");
        let lista = [];
        try {
            if (emailLogin) {
                const r1 = await fetch(`/dietas/paciente/email/${encodeURIComponent(emailLogin)}`);
                if (r1.ok) { const d1 = await r1.json(); lista = Array.isArray(d1) ? d1 : (d1 ? [d1] : []); }
            }
            if (!lista.length && pacienteId) {
                const r2 = await fetch(`/dietas/paciente/${pacienteId}`);
                if (r2.ok) { const d2 = await r2.json(); lista = Array.isArray(d2) ? d2 : (d2 ? [d2] : []); }
            }
        } catch(e) {
            c.innerHTML = `<div style="text-align:center;padding:2rem;color:#dc2626">⚠️ Erro ao carregar dieta.</div>`; return;
        }

        // Remove duplicatas
        const vistos = new Set();
        lista = lista.filter(i => { if(vistos.has(i.id)) return false; vistos.add(i.id); return true; });

        if (!lista.length) {
            c.innerHTML = `<div style="text-align:center;padding:3rem;color:#6b7280"><div style="font-size:2.5rem;margin-bottom:.75rem">🥗</div><p>Seu nutricionista ainda não cadastrou sua dieta.</p></div>`;
            return;
        }

        c.innerHTML = `<div class="grid grid-2">${lista.map(item => `
      <div class="refeicao-card">
        <div class="refeicao-header"></div>
        <div class="refeicao-body">
          <h3 class="refeicao-titulo">🍽️ ${item.refeicaoNome || "Refeição"}</h3>
          <span class="badge badge-horario">🕐 ${item.horario || "—"}</span>
          <p class="refeicao-descricao">${item.descricao || "Sem descrição"}</p>
          ${item.objetivo ? `<span class="badge badge-manter-peso">🎯 ${item.objetivo}</span>` : ''}
          <button class="btn btn-primary" style="width:100%;margin-top:1rem"
            data-id="${item.id}"
            data-nome="${(item.refeicaoNome||'Refeição').replace(/"/g,'&quot;')}"
            data-desc="${(item.descricao||'').replace(/"/g,'&quot;')}"
            onclick="abrirChat(this)">
            🤖 Sugerir Substituição com IA
          </button>
        </div>
      </div>
    `).join('')}</div>`;
    }

    function abrirChat(btn) {
        chatCtx = { id: btn.dataset.id, nome: btn.dataset.nome, desc: btn.dataset.desc };
        chatHist = [];
        document.getElementById('chatCtx').innerText = `Refeição: ${chatCtx.nome} — "${chatCtx.desc || 'sem descrição'}"`;
        const msgs = document.getElementById('chatMsgs');
        msgs.innerHTML = '';
        addBot(`Olá! 👋 Sou o NutriBot.\n\nVocê quer ajuda com "${chatCtx.nome}".\n\nMe diga o que quer substituir — alimento que não gosta, restrição ou preferência. Vou sugerir alternativas com equivalência nutricional! 🥦`);
        document.getElementById('chatOverlay').classList.add('open');
        setTimeout(() => document.getElementById('chatInput').focus(), 300);
    }

    function fecharChat() { document.getElementById('chatOverlay').classList.remove('open'); }
    function fecharChatFora(e) { if(e.target.id==='chatOverlay') fecharChat(); }

    function addBot(txt) {
        const d = document.createElement('div'); d.className='msg msg-bot'; d.innerText=txt;
        const m = document.getElementById('chatMsgs'); m.appendChild(d); m.scrollTop=m.scrollHeight;
    }
    function addUser(txt) {
        const d = document.createElement('div'); d.className='msg msg-user'; d.innerText=txt;
        const m = document.getElementById('chatMsgs'); m.appendChild(d); m.scrollTop=m.scrollHeight;
    }
    function addLoad() {
        const d = document.createElement('div'); d.className='msg msg-load'; d.id='msgLoad'; d.innerText='⏳ NutriBot está pensando...';
        const m = document.getElementById('chatMsgs'); m.appendChild(d); m.scrollTop=m.scrollHeight;
    }
    function removeLoad() { document.getElementById('msgLoad')?.remove(); }

    async function enviarMsg() {
        const input = document.getElementById('chatInput');
        const texto = input.value.trim(); if(!texto) return;
        input.value = ''; addUser(texto); addLoad();
        chatHist.push({ role:"user", content:texto });

        try {
            const res = await fetch('/api/nutribot/chat', {
                method:'POST', headers:{'Content-Type':'application/json'},
                body: JSON.stringify({
                    model:"claude-sonnet-4-20250514", max_tokens:1000,
                    system:`Você é o NutriBot, assistente nutricional do NutriSmart. Refeição: "${chatCtx.nome}". Descrição: "${chatCtx.desc||'não informada'}". Sugira substituições com equivalência calórica e de macros. Responda em português, máximo 3 parágrafos.`,
                    messages: chatHist
                })
            });
            removeLoad();
            if(!res.ok) { addBot("⚠️ Serviço indisponível. Tente novamente."); return; }
            const data = await res.json();
            const resp = data.content?.[0]?.text || "Não consegui processar. Tente novamente.";
            chatHist.push({ role:"assistant", content:resp });
            addBot(resp);
        } catch(e) {
            removeLoad(); addBot("⚠️ Erro de conexão. Verifique se o backend está rodando.");
        }
    }

    // CONSULTAS
    function stKey() { return `ns_consultas_${pacienteId}`; }
    function getC()  { return JSON.parse(localStorage.getItem(stKey())) || []; }
    function setC(a) {
        localStorage.setItem(stKey(), JSON.stringify(a));
        const g = JSON.parse(localStorage.getItem('ns_consultas')) || [];
        localStorage.setItem('ns_consultas', JSON.stringify([...g.filter(c=>c.pacienteId!==pacienteId), ...a]));
    }

    function solicitarConsulta() {
        const data=document.getElementById('dataConsulta').value;
        const horario=document.getElementById('horarioConsulta').value;
        const tipo=document.getElementById('tipoConsulta').value;
        const obs=document.getElementById('obsConsulta').value.trim();
        if(!data||!horario||!tipo) { Swal.fire({icon:'warning',title:'Campos obrigatórios',text:'Preencha data, horário e tipo.',confirmButtonColor:'#1B4332'}); return; }
        const lista = getC();
        lista.unshift({ id:Date.now(), paciente:pacienteNome, pacienteId, data, horario, tipo, obs, status:'pendente', solicitadoEm:new Date().toLocaleDateString('pt-BR') });
        setC(lista);
        ['dataConsulta','horarioConsulta','tipoConsulta','obsConsulta'].forEach(id=>document.getElementById(id).value='');
        renderHistorico();
        Swal.fire({icon:'success',title:'Solicitação enviada!',text:'Aguarde a confirmação do nutricionista.',confirmButtonColor:'#1B4332'});
    }

    function aceitarSug(id) {
        const l=getC(); const i=l.find(c=>c.id===id); if(!i) return;
        i.status='aceita'; i.data=i.dataSugerida; i.horario=i.horarioSugerido;
        setC(l); renderHistorico(); Swal.fire({icon:'success',title:'Horário confirmado!',confirmButtonColor:'#1B4332'});
    }
    function recusarSug(id) {
        const l=getC(); const i=l.find(c=>c.id===id); if(!i) return;
        i.status='recusada'; setC(l); renderHistorico();
    }

    function renderHistorico() {
        const lista=getC(); const c=document.getElementById('historicoConsultas');
        if(!lista.length) { c.innerHTML=`<div style="text-align:center;padding:1.5rem;color:#6b7280">📭 Nenhuma solicitação ainda.</div>`; return; }
        const lb={ pendente:'⏳ Pendente', aceita:'✅ Aceita', recusada:'❌ Recusada', sugerido:'🔄 Novo Horário' };
        c.innerHTML = lista.map(x=>`
      <div class="hist-card ${x.status}">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:.5rem;margin-bottom:.3rem">
          <div>
            <div style="font-weight:700;font-size:.9rem;color:#1a3a2a">📆 ${fmt(x.data)} às ${x.horario}</div>
            <div style="font-size:.8rem;color:#6b7280">${x.tipo} · ${x.solicitadoEm}</div>
          </div>
          <span class="badge-status ${x.status}">${lb[x.status]||x.status}</span>
        </div>
        ${x.obs?`<p style="font-size:.82rem;color:#4b5563;margin-top:.3rem">💬 ${x.obs}</p>`:''}
        ${x.status==='sugerido'?`<div class="sug-box">🟣 Nutricionista sugeriu: ${fmt(x.dataSugerida)} às ${x.horarioSugerido}</div><div class="sug-btns"><button class="btn-sim" onclick="aceitarSug(${x.id})">✅ Aceitar</button><button class="btn-nao" onclick="recusarSug(${x.id})">❌ Recusar</button></div>`:''}
      </div>`).join('');
    }

    function fmt(iso) { if(!iso) return '—'; const [y,m,d]=iso.split('-'); return `${d}/${m}/${y}`; }
    function logout() { localStorage.clear(); window.location.href="/login.html"; }
</script>
</body>
</html>
