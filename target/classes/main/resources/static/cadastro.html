<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - NutriSmart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #28a745, #20c997);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        .container-box {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            width: 100%;
            max-width: 420px;
            margin: 20px;
        }
        .title {
            text-align: center;
            font-weight: 700;
            margin-bottom: 20px;
            color: #333;
        }
        .form-control {
            border-radius: 10px;
            padding: 12px;
        }
        .btn-main {
            background: #28a745;
            color: white;
            border-radius: 30px;
            padding: 12px;
            width: 100%;
            border: none;
            font-weight: 500;
            transition: 0.3s;
        }
        .btn-main:hover {
            background: #218838;
            color: white;
        }
        .error {
            color: red;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="container-box">
    <h2 class="title">Criar conta</h2>
    <form id="cadastroForm">
        <div class="mb-3">
            <label class="form-label">Nome</label>
            <input type="text" class="form-control" id="name" required>
            <div id="nameError" class="error"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" id="email" required>
            <div id="emailError" class="error"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Senha</label>
            <input type="password" class="form-control" id="password" required>
            <div id="passwordError" class="error"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Confirmar senha</label>
            <input type="password" class="form-control" id="confirmPassword" required>
            <div id="confirmError" class="error"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Tipo de usuário</label>
            <select class="form-control" id="userType" required>
                <option value="">Selecione</option>
                <option value="paciente">Paciente</option>
                <option value="nutricionista">Nutricionista</option>
            </select>
            <div id="typeError" class="error"></div>
        </div>

        <div class="mb-3" id="crnField" style="display:none;">
            <label class="form-label">CRN</label>
            <input type="text" class="form-control" id="crn">
            <div id="crnError" class="error"></div>
        </div>

        <button type="submit" class="btn btn-main">Cadastrar</button>
    </form>
</div>

<script>
    // 1. Lógica de Interface para o campo CRN
    const userTypeSelect = document.getElementById("userType");
    const crnField = document.getElementById("crnField");
    const crnInput = document.getElementById("crn");

    userTypeSelect.addEventListener("change", function() {
        if (this.value === "nutricionista") {
            crnField.style.display = "block";
            crnInput.required = true;
        } else {
            crnField.style.display = "none";
            crnInput.value = "";
            crnInput.required = false;
        }
    });

    // 2. Envio do Formulário
    document.getElementById("cadastroForm").addEventListener("submit", async (e) => {
        e.preventDefault();

        // Validação simples de senha
        const password = document.getElementById("password").value;
        const confirmPassword = document.getElementById("confirmPassword").value;

        if (password !== confirmPassword) {
            alert("As senhas não coincidem!");
            return;
        }

        const dados = {
            name: document.getElementById("name").value,
            email: document.getElementById("email").value,
            password: password,
            type: userTypeSelect.value,
            crn: userTypeSelect.value === "nutricionista" ? crnInput.value : null
        };

        try {
            const response = await fetch("http://localhost:8080/api/usuarios/cadastro", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(dados)
            });

            const result = await response.json();

            if (response.ok) {
                alert("Cadastro realizado com sucesso!");
                window.location.href = "login.html";
            } else {
                alert("Erro: " + (result.erro || "Falha no cadastro"));
            }
        } catch (error) {
            console.error("Erro na conexão:", error);
            alert("Erro ao conectar com o servidor. Verifique o console.");
        }
    });
</script>

</body>
</html>
