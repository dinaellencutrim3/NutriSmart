<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes do Paciente - NutriSmart</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Sans', sans-serif; background: #f0fdf4; color: #1a3a2a; }
        .navbar { display:flex; align-items:center; justify-content:space-between; padding:0 2rem; height:64px; background:#fff; border-bottom:1px solid rgba(82,183,136,0.25); box-shadow:0 2px 12px rgba(45,106,79,0.07); position:sticky; top:0; z-index:100; }
        .navbar-logo { font-family:'Playfair Display',serif; font-size:1.2rem; font-weight:700; color:#2D6A4F; text-decoration:none; display:flex; align-items:center; gap:0.5rem; }
        .navbar-menu { display:flex; align-items:center; gap:0.75rem; }
        .btn-nav { display:inline-flex; align-items:center; gap:0.4rem; padding:0.45rem 1rem; background:#f0fdf4; border:2px solid #52B788; color:#2D6A4F; border-radius:8px; font-size:0.85rem; font-weight:600; text-decoration:none; transition:all 0.2s; cursor:pointer; font-family:'DM Sans',sans-serif; }
        .btn-nav:hover { background:#52B788; color:#fff; }
        .btn-sair { border:none; background:transparent; color:#dc2626; font-weight:600; cursor:pointer; padding:0.5rem 1rem; border-radius:8px; font-size:0.85rem; display:inline-flex; align-items:center; gap:0.4rem; font-family:'DM Sans',sans-serif; }
        .btn-sair:hover { background:#fee2e2; }
        .container { max-width:1000px; margin:0 auto; padding:2rem; }
        .breadcrumb { display:flex; align-items:center; gap:0.5rem; margin-bottom:1.5rem; font-size:0.85rem; color:#6b7280; }
        .breadcrumb a { color:#2D6A4F; text-decoration:none; font-weight:600; }
        .patient-header { background:#fff; border-radius:20px; box-shadow:0 4px 20px rgba(45,106,79,0.08); overflow:hidden; margin-bottom:1.5rem; }
        .patient-header-bar { height:5px; background:linear-gradient(90deg,#2D6A4F,#52B788); }
        .patient-header-body { padding:1.8rem 2rem; display:flex; align-items:flex-start; gap:1.5rem; flex-wrap:wrap; }
        .patient-avatar-lg { width:80px; height:80px; border-radius:50%; background:#f0fdf4; border:3px solid #52B788; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
        .patient-main { flex:1; min-width:200px; }
        .patient-nome { font-family:'Playfair Display',serif; font-size:1.8rem; font-weight:700; color:#1a3a2a; margin-bottom:0.3rem; }
        .patient-email { font-size:0.88rem; color:#6b7280; margin-bottom:0.7rem; }
        .patient-objetivo { display:inline-flex; align-items:center; gap:0.35rem; background:#d1fae5; color:#065f46; padding:0.3rem 0.85rem; border-radius:999px; font-size:0.8rem; font-weight:700; margin-bottom:1rem; }
        .info-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(130px,1fr)); gap:0.75rem; }
        .info-box { background:#f7fdf9; border:1px solid #dcfce7; border-radius:12px; padding:0.85rem 1rem; }
        .info-label { font-size:0.72rem; color:#6b7280; text-transform:uppercase; letter-spacing:0.05em; margin-bottom:0.3rem; font-weight:600; }
        .info-value { font-weight:700; color:#1a3a2a; font-size:1rem; }
        .imc-badge { display:inline-block; padding:0.2rem 0.6rem; border-radius:6px; font-size:0.7rem; font-weight:700; margin-left:0.35rem; }
        .imc-normal    { background:#d1fae5; color:#065f46; }
        .imc-sobrepeso { background:#fef3c7; color:#d97706; }
        .imc-obesidade { background:#fee2e2; color:#dc2626; }
        .imc-baixo     { background:#dbeafe; color:#1e40af; }
        .extra-grid { display:grid; grid-template-columns:1fr 1fr; gap:0.75rem; margin-top:0.75rem; }
        .extra-box { background:#f9fafb; border:1px solid #e5e7eb; border-radius:12px; padding:0.85rem 1rem; }
        .extra-label { font-size:0.72rem; color:#9ca3af; text-transform:uppercase; font-weight:600; margin-bottom:0.3rem; }
        .extra-value { color:#374151; font-size:0.9rem; font-weight:500; }
        .actions-bar { display:flex; gap:0.75rem; flex-wrap:wrap; margin-bottom:1.5rem; }
        .btn-action { display:inline-flex; align-items:center; gap:0.45rem; padding:0.7rem 1.3rem; border-radius:10px; font-family:'DM Sans',sans-serif; font-size:0.88rem; font-weight:700; cursor:pointer; transition:0.2s; border:none; text-decoration:none; }
        .btn-primary { background:linear-gradient(135deg,#2D6A4F,#52B788); color:#fff; }
        .btn-primary:hover { opacity:0.88; transform:translateY(-1px); }
        .btn-outline { background:#fff; border:2px solid #52B788; color:#2D6A4F; }
        .btn-outline:hover { background:#52B788; color:#fff; }
        .btn-warning { background:#fff; border:2px solid #f59e0b; color:#d97706; }
        .btn-warning:hover { background:#fef3c7; }
        .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:500; display:none; align-items:center; justify-content:center; padding:1rem; }
        .modal-overlay.open { display:flex; }
        .modal-box { background:#fff; border-radius:20px; width:100%; max-width:580px; max-height:90vh; overflow-y:auto; box-shadow:0 20px 60px rgba(0,0,0,0.2); animation:fadeIn .25s ease; }
        @keyframes fadeIn { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }
        .modal-header { padding:1.3rem 1.5rem; border-bottom:1px solid #f0fdf4; display:flex; align-items:center; justify-content:space-between; }
        .modal-title { font-family:'Playfair Display',serif; font-size:1.2rem; color:#1a3a2a; }
        .modal-close { background:#f0fdf4; border:none; color:#2D6A4F; width:32px; height:32px; border-radius:50%; font-size:1rem; cursor:pointer; display:flex; align-items:center; justify-content:center; }
        .modal-body { padding:1.5rem; }
        .form-group { margin-bottom:1rem; }
        .form-row { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
        .form-label { display:block; margin-bottom:0.4rem; font-size:0.78rem; font-weight:700; color:#374151; text-transform:uppercase; letter-spacing:0.04em; }
        .form-input { width:100%; padding:0.75rem; border:2px solid #e5e7eb; border-radius:8px; font-family:'DM Sans',sans-serif; font-size:0.9rem; outline:none; transition:border-color 0.2s; }
        .form-input:focus { border-color:#52B788; }
        .modal-footer { padding:1rem 1.5rem; border-top:1px solid #f0fdf4; display:flex; gap:0.75rem; justify-content:flex-end; }
        .btn-save { padding:0.75rem 1.5rem; border:none; border-radius:8px; background:linear-gradient(135deg,#2D6A4F,#52B788); color:#fff; font-weight:700; font-size:0.9rem; cursor:pointer; font-family:'DM Sans',sans-serif; }
        .btn-cancel { padding:0.75rem 1.5rem; border:2px solid #e5e7eb; border-radius:8px; background:transparent; color:#6b7280; font-weight:700; font-size:0.9rem; cursor:pointer; font-family:'DM Sans',sans-serif; }
        .section-card { background:#fff; border-radius:20px; box-shadow:0 4px 20px rgba(45,106,79,0.08); overflow:hidden; margin-bottom:1.5rem; }
        .section-card-header { display:flex; align-items:center; justify-content:space-between; padding:1.2rem 1.5rem; border-bottom:1px solid #f0fdf4; }
        .section-card-title { font-family:'Playfair Display',serif; font-size:1.2rem; color:#1a3a2a; display:flex; align-items:center; gap:0.5rem; }
        .section-card-body { padding:1.5rem; }
        .empty-state { text-align:center; padding:2.5rem; color:#9ca3af; }
        .empty-state i { font-size:2.5rem; margin-bottom:0.75rem; display:block; color:#d1fae5; }
        .danger-zone { background:#fff; border-radius:20px; border:2px solid #fee2e2; padding:1.5rem; margin-bottom:1.5rem; }
        .danger-title { font-family:'Playfair Display',serif; font-size:1.1rem; color:#dc2626; margin-bottom:0.4rem; display:flex; align-items:center; gap:0.5rem; }
        .danger-desc { font-size:0.85rem; color:#6b7280; margin-bottom:1rem; }
        .btn-delete-full { display:inline-flex; align-items:center; gap:0.5rem; padding:0.75rem 1.5rem; background:#dc2626; color:#fff; border:none; border-radius:10px; font-weight:700; font-size:0.9rem; cursor:pointer; font-family:'DM Sans',sans-serif; }
        .btn-delete-full:hover { background:#b91c1c; }
        @keyframes spin { to{transform:rotate(360deg);} }
        .spinner { display:inline-block; width:18px; height:18px; border:2px solid rgba(82,183,136,0.3); border-top-color:#52B788; border-radius:50%; animation:spin .8s linear infinite; vertical-align:middle; margin-right:0.5rem; }
        @media(max-width:768px) { .container{padding:1rem;} .patient-header-body{flex-direction:column;} .extra-grid{grid-template-columns:1fr;} .info-grid{grid-template-columns:repeat(2,1fr);} .form-row{grid-template-columns:1fr;} .actions-bar{flex-direction:column;} }
    </style>
</head>
<body>

<script>
    (function () {
        const tipo = localStorage.getItem("tipoUsuario");
        if (!tipo) window.location.href = "/login.html";
        else if (tipo !== "NUTRICIONISTA") window.location.href = "/home_paciente.html";
    })();
</script>

<nav class="navbar">
    <a href="/dashboard.html" class="navbar-logo">
        <svg width="26" height="26" viewBox="0 0 32 32" fill="none">
            <path d="M16 2C16 2 8 6 8 16C8 20 10 24 16 28C22 24 24 20 24 16C24 6 16 2 16 2Z" fill="#52B788"/>
            <path d="M16 8C13 10 12 13 12 16C12 18 13 20 16 22C19 20 20 18 20 16C20 13 19 10 16 8Z" fill="#2D6A4F"/>
        </svg>
        NutriSmart
    </a>
    <div class="navbar-menu">
        <a href="/dashboard.html" class="btn-nav"><i class="fa-solid fa-gauge"></i> Dashboard</a>
        <button class="btn-sair" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> Sair</button>
    </div>
</nav>

<div class="container">

    <div class="breadcrumb">
        <a href="/dashboard.html"><i class="fa-solid fa-gauge"></i> Dashboard</a>
        <span>/</span>
        <span id="breadNome">Detalhes do Paciente</span>
    </div>

    <div class="patient-header">
        <div class="patient-header-bar"></div>
        <div class="patient-header-body">
            <div class="patient-avatar-lg">
                <i class="fa-solid fa-user" style="color:#2D6A4F;font-size:2rem"></i>
            </div>
            <div class="patient-main">
                <div class="patient-nome" id="nomePaciente"><span class="spinner"></span> Carregando...</div>
                <div class="patient-email" id="emailPaciente"></div>
                <div class="patient-objetivo" id="objetivoPaciente" style="display:none">
                    <i class="fa-solid fa-bullseye"></i><span id="objetivoTexto"></span>
                </div>
                <div class="info-grid" id="infoGrid"></div>
                <div class="extra-grid" id="extraGrid" style="display:none"></div>
            </div>
        </div>
    </div>

    <div class="actions-bar">
        <button class="btn-action btn-primary" onclick="editarDieta()">
            <i class="fa-solid fa-pen-to-square"></i> Editar Plano Alimentar
        </button>
        <button class="btn-action btn-warning" onclick="abrirModalEditar()">
            <i class="fa-solid fa-user-pen"></i> Editar Dados do Paciente
        </button>
    </div>

    <div class="section-card">
        <div class="section-card-header">
            <span class="section-card-title">
                <i class="fa-solid fa-utensils" style="color:#52B788"></i> Plano Alimentar Atual
            </span>
            <button class="btn-action btn-primary" style="padding:.5rem 1rem;font-size:.82rem" onclick="editarDieta()">
                <i class="fa-solid fa-plus"></i> Adicionar / Editar
            </button>
        </div>
        <div class="section-card-body" id="listaDietas">
            <div class="empty-state"><span class="spinner"></span> Carregando...</div>
        </div>
    </div>

    <div class="danger-zone">
        <div class="danger-title"><i class="fa-solid fa-triangle-exclamation"></i> Zona de Perigo</div>
        <p class="danger-desc">Ao apagar este paciente, todas as dietas e dados vinculados a ele serão removidos permanentemente. Esta ação não pode ser desfeita.</p>
        <button class="btn-delete-full" onclick="apagarPaciente()">
            <i class="fa-solid fa-trash"></i> Apagar Paciente
        </button>
    </div>

</div>

<div class="modal-overlay" id="modalEditar" onclick="fecharModalFora(event)">
    <div class="modal-box">
        <div class="modal-header">
            <span class="modal-title"><i class="fa-solid fa-user-pen" style="color:#52B788;margin-right:.5rem"></i> Editar Dados do Paciente</span>
            <button class="modal-close" onclick="fecharModal()">✕</button>
        </div>
        <div class="modal-body">
            <div class="form-group"><label class="form-label">Nome Completo *</label><input type="text" class="form-input" id="e-nome"></div>
            <div class="form-group"><label class="form-label">E-mail</label><input type="email" class="form-input" id="e-email"></div>
            <div class="form-row">
                <div class="form-group"><label class="form-label">Idade</label><input type="number" class="form-input" id="e-idade" min="1" max="120"></div>
                <div class="form-group"><label class="form-label">Sexo</label><select class="form-input" id="e-sexo"><option value="">Selecione</option><option>Feminino</option><option>Masculino</option></select></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label class="form-label">Peso (kg)</label><input type="number" class="form-input" id="e-peso" step="0.1"></div>
                <div class="form-group"><label class="form-label">Altura (m)</label><input type="number" class="form-input" id="e-altura" step="0.01"></div>
            </div>
            <div class="form-group"><label class="form-label">Objetivo</label><select class="form-input" id="e-objetivo"><option value="">Selecione</option><option>Emagrecimento</option><option>Hipertrofia</option><option>Manutenção</option><option>Reeducação alimentar</option></select></div>
            <div class="form-group"><label class="form-label">Restrições Alimentares</label><input type="text" class="form-input" id="e-restricoes" placeholder="Ex: lactose, glúten..."></div>
            <div class="form-group"><label class="form-label">Observações</label><textarea class="form-input" id="e-observacoes" rows="3"></textarea></div>
            <div id="erroEditar" style="display:none;background:#fee2e2;color:#991b1b;padding:.75rem;border-radius:8px;font-size:.85rem;margin-top:.5rem"></div>
        </div>
        <div class="modal-footer">
            <button class="btn-cancel" onclick="fecharModal()">Cancelar</button>
            <button class="btn-save" onclick="salvarEdicao()"><i class="fa-solid fa-floppy-disk"></i> Salvar Alterações</button>
        </div>
    </div>
</div>

<script>
    const pacienteId = localStorage.getItem("pacienteSelecionado");
    if (!pacienteId) window.location.href = "/dashboard.html";
    let pacienteAtual = null;

    function editarDieta() { window.location.href = "/editar_dieta.html"; }
    function logout() { localStorage.clear(); window.location.href = "/login.html"; }

    function classificarIMC(imc) {
        if (imc < 18.5) return { label:'Abaixo do peso', cls:'imc-baixo' };
        if (imc < 25)   return { label:'Peso normal',    cls:'imc-normal' };
        if (imc < 30)   return { label:'Sobrepeso',      cls:'imc-sobrepeso' };
        return              { label:'Obesidade',          cls:'imc-obesidade' };
    }

    async function carregarPaciente() {
        try {
            const res = await fetch('/pacientes');
            const lista = await res.json();
            const p = lista.find(x => String(x.id) === String(pacienteId));
            if (!p) { document.getElementById("nomePaciente").innerText = "Paciente não encontrado"; return; }
            pacienteAtual = p;
            document.getElementById("nomePaciente").innerText = p.nome;
            document.getElementById("breadNome").innerText    = p.nome;
            if (p.email) document.getElementById("emailPaciente").innerHTML = `<i class="fa-solid fa-envelope" style="color:#52B788;margin-right:.3rem"></i>${p.email}`;
            if (p.objetivo) { document.getElementById("objetivoTexto").innerText = p.objetivo; document.getElementById("objetivoPaciente").style.display = "inline-flex"; }
            const imcVal  = p.imc ? Number(p.imc).toFixed(1) : '—';
            const imcInfo = p.imc ? classificarIMC(Number(p.imc)) : null;
            document.getElementById("infoGrid").innerHTML = `
                <div class="info-box"><div class="info-label">Idade</div><div class="info-value">${p.idade ? p.idade+' anos' : '—'}</div></div>
                <div class="info-box"><div class="info-label">Sexo</div><div class="info-value">${p.sexo || '—'}</div></div>
                <div class="info-box"><div class="info-label">Peso</div><div class="info-value">${p.peso ? p.peso+' kg' : '—'}</div></div>
                <div class="info-box"><div class="info-label">Altura</div><div class="info-value">${p.altura ? p.altura+' m' : '—'}</div></div>
                <div class="info-box"><div class="info-label">IMC</div><div class="info-value">${imcVal}${imcInfo ? `<span class="imc-badge ${imcInfo.cls}">${imcInfo.label}</span>` : ''}</div></div>`;
            if (p.restricoes || p.observacoes) {
                document.getElementById("extraGrid").style.display = "grid";
                document.getElementById("extraGrid").innerHTML = `
                    ${p.restricoes ? `<div class="extra-box"><div class="extra-label"><i class="fa-solid fa-triangle-exclamation" style="color:#f59e0b"></i> Restrições</div><div class="extra-value">${p.restricoes}</div></div>` : ''}
                    ${p.observacoes ? `<div class="extra-box"><div class="extra-label"><i class="fa-solid fa-note-sticky" style="color:#6b7280"></i> Observações</div><div class="extra-value">${p.observacoes}</div></div>` : ''}`;
            }
        } catch(e) { document.getElementById("nomePaciente").innerText = "Erro ao carregar."; }
    }

    async function carregarDieta() {
        const container = document.getElementById("listaDietas");
        try {
            const res = await fetch(`/dietas/paciente/${pacienteId}`);
            const dietas = await res.json();
            if (!dietas.length) {
                container.innerHTML = `<div class="empty-state"><i class="fa-solid fa-clipboard-list"></i><p>Nenhum plano alimentar cadastrado.<br><button class="btn-action btn-primary" style="margin-top:1rem" onclick="editarDieta()"><i class="fa-solid fa-plus"></i> Criar Plano</button></p></div>`;
                return;
            }

            const grupos = new Map();
            dietas.forEach(d => {
                const chave = d.refeicaoNome || 'Refeição';
                if (!grupos.has(chave)) grupos.set(chave, { horario: d.horario, itens: [] });
                grupos.get(chave).itens.push(d);
            });

            const emojiRefeicao = nome => {
                const n = nome.toLowerCase();
                if (n.includes('café') || n.includes('cafe') || n.includes('manhã') || n.includes('manha')) return '☀️';
                if (n.includes('almoço') || n.includes('almoco')) return '🍛';
                if (n.includes('janta') || n.includes('jantar')) return '🌙';
                if (n.includes('lanche')) return '🥪';
                if (n.includes('ceia')) return '🌛';
                return '🍽️';
            };

            const parseDesc = desc => {
                if (!desc) return { nome: '—', qtd: '', kcal: '', macros: '' };
                const partes = desc.split(' — ');
                const nome = partes[0] || desc;
                const resto = partes[1] || '';
                const campos = resto.split(' · ');
                return { nome, qtd: campos[0] || '', kcal: campos[1] || '', macros: campos[2] || '' };
            };

            let html = '';
            grupos.forEach((grupo, nomeRefeicao) => {
                const emoji = emojiRefeicao(nomeRefeicao);
                const horario = grupo.horario || '—';
                let totalKcal = 0;
                grupo.itens.forEach(it => {
                    const n = parseFloat((it.objetivo || '').replace(/[^\d.]/g, ''));
                    if (!isNaN(n)) totalKcal += n;
                });
                totalKcal = Math.round(totalKcal);
                const linhas = grupo.itens.map(it => {
                    const p = parseDesc(it.descricao);
                    return `<tr>
                        <td style="padding:.65rem 1rem;font-weight:600">${p.nome}</td>
                        <td style="padding:.65rem 1rem;text-align:center">${p.qtd}</td>
                        <td style="padding:.65rem 1rem;text-align:center">${p.kcal}</td>
                        <td style="padding:.65rem 1rem;color:#6b7280;font-size:.82rem">${p.macros}</td>
                    </tr>`;
                }).join('');
                html += `
                <div style="background:#fff;border-radius:14px;overflow:hidden;border:1px solid rgba(82,183,136,0.15);margin-bottom:1rem;box-shadow:0 2px 8px rgba(27,67,50,0.05)">
                    <div style="display:flex;align-items:center;justify-content:space-between;padding:.85rem 1.2rem;background:linear-gradient(135deg,#1B4332,#2D6A4F);color:#fff;flex-wrap:wrap;gap:.4rem">
                        <div style="display:flex;align-items:center;gap:.5rem;font-weight:700;font-size:.95rem">
                            <span>${emoji}</span>
                            <span>${nomeRefeicao}</span>
                            <span style="background:rgba(255,255,255,0.18);padding:.15rem .6rem;border-radius:999px;font-size:.75rem">🕐 ${horario}</span>
                        </div>
                        ${totalKcal > 0 ? `<span style="background:rgba(82,183,136,0.35);padding:.2rem .7rem;border-radius:999px;font-size:.78rem;font-weight:700;color:#d1fae5">${totalKcal} kcal total</span>` : ''}
                    </div>
                    <div style="overflow-x:auto">
                        <table style="width:100%;border-collapse:collapse;font-size:.85rem">
                            <thead>
                                <tr style="background:#f0fdf4">
                                    <th style="padding:.55rem 1rem;text-align:left;font-size:.72rem;font-weight:700;text-transform:uppercase;color:#2D6A4F;border-bottom:2px solid #dcfce7">Alimento</th>
                                    <th style="padding:.55rem 1rem;text-align:center;font-size:.72rem;font-weight:700;text-transform:uppercase;color:#2D6A4F;border-bottom:2px solid #dcfce7">Quantidade</th>
                                    <th style="padding:.55rem 1rem;text-align:center;font-size:.72rem;font-weight:700;text-transform:uppercase;color:#2D6A4F;border-bottom:2px solid #dcfce7">Calorias</th>
                                    <th style="padding:.55rem 1rem;text-align:left;font-size:.72rem;font-weight:700;text-transform:uppercase;color:#2D6A4F;border-bottom:2px solid #dcfce7">Macros</th>
                                </tr>
                            </thead>
                            <tbody>${linhas}</tbody>
                        </table>
                    </div>
                </div>`;
            });
            container.innerHTML = html;
        } catch(e) {
            container.innerHTML = `<div class="empty-state"><i class="fa-solid fa-triangle-exclamation" style="color:#fca5a5"></i><p style="color:#dc2626">Erro ao carregar dieta.</p></div>`;
        }
    }

    function abrirModalEditar() {
        if (!pacienteAtual) return;
        const p = pacienteAtual;
        document.getElementById('e-nome').value        = p.nome || '';
        document.getElementById('e-email').value       = p.email || '';
        document.getElementById('e-idade').value       = p.idade || '';
        document.getElementById('e-sexo').value        = p.sexo || '';
        document.getElementById('e-peso').value        = p.peso || '';
        document.getElementById('e-altura').value      = p.altura || '';
        document.getElementById('e-objetivo').value    = p.objetivo || '';
        document.getElementById('e-restricoes').value  = p.restricoes || '';
        document.getElementById('e-observacoes').value = p.observacoes || '';
        document.getElementById('erroEditar').style.display = 'none';
        document.getElementById('modalEditar').classList.add('open');
    }

    function fecharModal() { document.getElementById('modalEditar').classList.remove('open'); }
    function fecharModalFora(e) { if (e.target === document.getElementById('modalEditar')) fecharModal(); }

    async function salvarEdicao() {
        const erroDiv = document.getElementById('erroEditar');
        erroDiv.style.display = 'none';
        const dados = {
            nome:        document.getElementById('e-nome').value.trim(),
            email:       document.getElementById('e-email').value.trim().toLowerCase(),
            idade:       parseInt(document.getElementById('e-idade').value) || null,
            sexo:        document.getElementById('e-sexo').value,
            peso:        parseFloat(document.getElementById('e-peso').value) || null,
            altura:      parseFloat(document.getElementById('e-altura').value) || null,
            objetivo:    document.getElementById('e-objetivo').value,
            restricoes:  document.getElementById('e-restricoes').value,
            observacoes: document.getElementById('e-observacoes').value
        };
        if (!dados.nome) { erroDiv.innerText = 'O nome é obrigatório.'; erroDiv.style.display = 'block'; return; }
        try {
            const res = await fetch(`/pacientes/${pacienteId}`, { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(dados) });
            const data = await res.json();
            if (!res.ok) { erroDiv.innerText = data.erro || 'Erro ao salvar.'; erroDiv.style.display = 'block'; return; }
            fecharModal();
            await Swal.fire({ icon:'success', title:'Dados atualizados!', timer:1800, showConfirmButton:false });
            carregarPaciente();
        } catch(e) { erroDiv.innerText = 'Erro de conexão.'; erroDiv.style.display = 'block'; }
    }

    async function apagarPaciente() {
        const confirm = await Swal.fire({
            icon:'warning', title:'Apagar paciente?',
            html:`Todos os dados de <strong>${pacienteAtual?.nome || 'este paciente'}</strong> serão removidos permanentemente.`,
            showCancelButton:true, confirmButtonText:'Sim, apagar', cancelButtonText:'Cancelar',
            confirmButtonColor:'#dc2626', cancelButtonColor:'#6b7280'
        });
        if (!confirm.isConfirmed) return;
        try {
            const res = await fetch(`/pacientes/${pacienteId}`, { method:'DELETE' });
            if (res.ok) {
                await Swal.fire({ icon:'success', title:'Paciente removido.', timer:1800, showConfirmButton:false });
                localStorage.removeItem("pacienteSelecionado");
                window.location.href = "/dashboard.html";
            } else {
                const data = await res.json();
                Swal.fire({ icon:'error', title:'Erro', text:data.erro || 'Não foi possível remover.' });
            }
        } catch(e) { Swal.fire({ icon:'error', title:'Erro de conexão.' }); }
    }

    carregarPaciente();
    carregarDieta();
</script>
</body>
</html>
