<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consultas - NutriSmart</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'DM Sans',sans-serif;background:#f0fdf4;color:#1a3a2a;}
        .navbar{height:70px;background:#fff;border-bottom:1px solid rgba(82,183,136,0.2);display:flex;align-items:center;justify-content:space-between;padding:0 2rem;box-shadow:0 2px 10px rgba(45,106,79,0.06);}
         .logo{display:flex;align-items:center;gap:.7rem;}
        .logo-text{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:700;color:#2D6A4F;}
        .btn-back{text-decoration:none;color:#2D6A4F;border:2px solid #52B788;padding:.7rem 1rem;border-radius:12px;font-weight:700;transition:.2s;}
        .btn-back:hover{background:#52B788;color:#fff;}
        .container{max-width:1100px;margin:auto;padding:2rem;}
        .page-title{font-family:'Playfair Display',serif;font-size:2rem;margin-bottom:.5rem;}
        .page-subtitle{color:#6b7280;margin-bottom:2rem;}
        .filters{display:flex;gap:.7rem;margin-bottom:1.5rem;flex-wrap:wrap;}
        .filter-btn{padding:.6rem 1.2rem;border-radius:20px;border:2px solid #d1d5db;background:#fff;cursor:pointer;font-weight:600;font-size:.85rem;transition:.2s;}
        .filter-btn.active,.filter-btn:hover{border-color:#52B788;background:#52B788;color:#fff;}
        .cards{display:flex;flex-direction:column;gap:1rem;}
        .consult-card{background:#fff;border-radius:18px;padding:1.5rem;box-shadow:0 4px 14px rgba(45,106,79,0.07);border-left:4px solid #d1d5db;transition:.2s;}
        .consult-card.pendente{border-left-color:#f59e0b;}
        .consult-card.aceita{border-left-color:#22c55e;}
        .consult-card.recusada{border-left-color:#ef4444;}
        .consult-card.sugerido{border-left-color:#8b5cf6;}
        .consult-top{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:1rem;margin-bottom:1rem;}
        .consult-info h3{font-size:1.1rem;font-weight:700;}
        .consult-info span{font-size:.85rem;color:#6b7280;}
        .badge{padding:.3rem .8rem;border-radius:20px;font-size:.8rem;font-weight:700;}
        .badge.pendente{background:#fef3c7;color:#d97706;}
        .badge.aceita{background:#dcfce7;color:#16a34a;}
        .badge.recusada{background:#fee2e2;color:#dc2626;}
        .badge.sugerido{background:#ede9fe;color:#7c3aed;}
        .consult-body{display:flex;gap:2rem;flex-wrap:wrap;margin-bottom:1rem;}
        .consult-detail{display:flex;flex-direction:column;gap:.2rem;}
        .consult-detail .label{font-size:.75rem;color:#9ca3af;text-transform:uppercase;font-weight:600;}
        .consult-detail .value{font-weight:600;font-size:.95rem;}
        .obs-box{background:#f9fafb;border-radius:10px;padding:.8rem;font-size:.85rem;color:#4b5563;margin-bottom:1rem;}
        .actions{display:flex;gap:.7rem;flex-wrap:wrap;}
        .btn-aceitar{background:linear-gradient(135deg,#52B788,#2D6A4F);color:#fff;border:none;padding:.7rem 1.2rem;border-radius:10px;cursor:pointer;font-weight:700;font-size:.85rem;}
        .btn-recusar{background:#fee2e2;color:#dc2626;border:none;padding:.7rem 1.2rem;border-radius:10px;cursor:pointer;font-weight:700;font-size:.85rem;}
        .btn-sugerir{background:#ede9fe;color:#7c3aed;border:none;padding:.7rem 1.2rem;border-radius:10px;cursor:pointer;font-weight:700;font-size:.85rem;}
        .sugerir-form{background:#f9fafb;border-radius:14px;padding:1rem;margin-top:.8rem;display:none;}
        .sugerir-form.open{display:block;}
        .sugerir-form label{font-size:.85rem;font-weight:600;margin-bottom:.4rem;display:block;}
        .sugerir-row{display:flex;gap:.7rem;flex-wrap:wrap;}
        .sugerir-form input{padding:.7rem;border-radius:10px;border:1px solid #d1d5db;outline:none;font-family:'DM Sans',sans-serif;}
        .btn-enviar{background:#7c3aed;color:#fff;border:none;padding:.7rem 1rem;border-radius:10px;cursor:pointer;font-weight:700;}
        .empty{text-align:center;padding:3rem;color:#9ca3af;}
        .empty span{font-size:3rem;display:block;margin-bottom:1rem;}
        .toast{position:fixed;bottom:2rem;right:2rem;background:#1a3a2a;color:#fff;padding:1rem 1.5rem;border-radius:14px;font-weight:600;transform:translateY(100px);opacity:0;transition:.3s;z-index:999;}
        .toast.show{transform:translateY(0);opacity:1;}
    </style>
</head>
<body>

<nav class="navbar">
    <div class="logo">
        <svg width="38" height="38" viewBox="0 0 40 40" fill="none">
            <path d="M20 5C15 5 12 8 12 12C12 16 15 19 20 25C25 19 28 16 28 12C28 8 25 5 20 5Z" fill="#52B788"/>
            <path d="M20 25C20 25 8 28 8 33C8 35 10 35 20 35C30 35 32 35 32 33C32 28 20 25 20 25Z" fill="#2D6A4F"/>
        </svg>
        <span class="logo-text">NutriSmart</span>
    </div>
    <a href="dashboard.html" class="btn-back">← Dashboard</a>
</nav>

<div class="container">
    <h1 class="page-title">📅 Consultas</h1>
    <p class="page-subtitle">Gerencie as solicitações de consulta dos seus pacientes.</p>

    <div class="filters">
        <button class="filter-btn active" onclick="filtrar('todas',this)">Todas</button>
        <button class="filter-btn" onclick="filtrar('pendente',this)">⏳ Pendentes</button>
        <button class="filter-btn" onclick="filtrar('aceita',this)">✅ Aceitas</button>
        <button class="filter-btn" onclick="filtrar('recusada',this)">❌ Recusadas</button>
        <button class="filter-btn" onclick="filtrar('sugerido',this)">🔄 Sugeridos</button>
    </div>

    <div class="cards" id="cardsContainer"></div>
</div>

<div class="toast" id="toast"></div>

<script>
    function getConsultas(){
        return JSON.parse(localStorage.getItem('ns_consultas'))||[];
    }
    function setConsultas(arr){
        localStorage.setItem('ns_consultas', JSON.stringify(arr));
    }

    let filtroAtivo = 'todas';

    function filtrar(status, btn){
        filtroAtivo = status;
        document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        renderCards();
    }

    function renderCards(){
        const consultas = getConsultas();
        const lista = filtroAtivo==='todas' ? consultas : consultas.filter(c=>c.status===filtroAtivo);
        const c = document.getElementById('cardsContainer');

        if(!lista.length){
            c.innerHTML=`<div class="empty"><span>📭</span>Nenhuma consulta encontrada.</div>`;
            return;
        }

        c.innerHTML = lista.map((cons,i) => {
            const idx = consultas.indexOf(cons);
            const badgeLabel = {pendente:'⏳ Pendente',aceita:'✅ Aceita',recusada:'❌ Recusada',sugerido:'🔄 Novo Horário Sugerido'}[cons.status]||cons.status;
            return `
    <div class="consult-card ${cons.status}" id="card_${idx}">
      <div class="consult-top">
        <div class="consult-info">
          <h3>👤 ${cons.paciente}</h3>
          <span>Solicitado em ${cons.solicitadoEm||'—'}</span>
        </div>
        <span class="badge ${cons.status}">${badgeLabel}</span>
      </div>
      <div class="consult-body">
        <div class="consult-detail"><span class="label">Data</span><span class="value">📆 ${cons.data}</span></div>
        <div class="consult-detail"><span class="label">Horário</span><span class="value">🕐 ${cons.horario}</span></div>
        <div class="consult-detail"><span class="label">Paciente</span><span class="value">${cons.paciente}</span></div>
        ${cons.horarioSugerido ? `<div class="consult-detail"><span class="label">Horário Sugerido</span><span class="value">🟣 ${cons.dataSugerida} às ${cons.horarioSugerido}</span></div>` : ''}
      </div>
      ${cons.obs ? `<div class="obs-box">💬 <strong>Observação:</strong> ${cons.obs}</div>` : ''}
      ${cons.status==='pendente' ? `
      <div class="actions">
        <button class="btn-aceitar" onclick="aceitar(${idx})">✅ Aceitar</button>
        <button class="btn-recusar" onclick="recusar(${idx})">❌ Recusar</button>
        <button class="btn-sugerir" onclick="toggleSugerir(${idx})">🔄 Sugerir Outro Horário</button>
      </div>
      <div class="sugerir-form" id="form_${idx}">
        <label>Novo horário disponível:</label>
        <div class="sugerir-row">
          <input type="date" id="novaData_${idx}">
          <input type="time" id="novoHorario_${idx}">
          <button class="btn-enviar" onclick="sugerirHorario(${idx})">Enviar Sugestão</button>
        </div>
      </div>` : ''}
      ${cons.status==='sugerido' ? `
      <div class="actions">
        <button class="btn-aceitar" onclick="aceitar(${idx})">✅ Confirmar Horário Sugerido</button>
        <button class="btn-recusar" onclick="recusar(${idx})">❌ Cancelar</button>
      </div>` : ''}
    </div>`;
        }).join('');
    }

    function aceitar(idx){
        const arr = getConsultas();
        arr[idx].status = 'aceita';
        // Se tinha sugestão, atualiza data/hora
        if(arr[idx].horarioSugerido){
            arr[idx].data    = arr[idx].dataSugerida;
            arr[idx].horario = arr[idx].horarioSugerido;
        }
        setConsultas(arr);
        renderCards();
        showToast('✅ Consulta aceita!');
    }

    function recusar(idx){
        const arr = getConsultas();
        arr[idx].status = 'recusada';
        setConsultas(arr);
        renderCards();
        showToast('❌ Consulta recusada.');
    }

    function toggleSugerir(idx){
        const f = document.getElementById(`form_${idx}`);
        f.classList.toggle('open');
    }

    function sugerirHorario(idx){
        const novaData    = document.getElementById(`novaData_${idx}`).value;
        const novoHorario = document.getElementById(`novoHorario_${idx}`).value;
        if(!novaData||!novoHorario){ showToast('⚠️ Informe data e horário'); return; }
        const arr = getConsultas();
        arr[idx].status = 'sugerido';
        arr[idx].dataSugerida    = novaData;
        arr[idx].horarioSugerido = novoHorario;
        setConsultas(arr);
        renderCards();
        showToast('🔄 Novo horário enviado ao paciente!');
    }

    function showToast(msg){
        const t=document.getElementById('toast');
        t.textContent=msg;t.classList.add('show');
        setTimeout(()=>t.classList.remove('show'),3000);
    }

    // Demo: adiciona consultas de exemplo se vazio
    if(!getConsultas().length){
        setConsultas([
            {paciente:'Maria Silva',data:'2026-06-05',horario:'14:00',obs:'Quero acompanhamento de perda de peso.',status:'pendente',solicitadoEm:'26/05/2026'},
            {paciente:'João Costa',data:'2026-06-07',horario:'10:30',obs:'',status:'aceita',solicitadoEm:'25/05/2026'},
        ]);
    }

    renderCards();
</script>
</body>
</html>
