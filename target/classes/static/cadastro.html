<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Cadastro - NutriApp</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <link rel="stylesheet" href="/css/style.css">
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

<div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md">

    <div class="text-center mb-6">

        <i class="fa-solid fa-user-plus text-4xl text-green-600"></i>

        <h1 class="text-2xl font-bold mt-3">
            Cadastro
        </h1>

        <p class="text-gray-500 text-sm mt-2">
            Crie sua conta no NutriApp
        </p>

    </div>

    <form id="formCadastro">

        <div class="space-y-4">

            <input id="nome"
                   type="text"
                   placeholder="Nome Completo"
                   class="w-full border p-3 rounded outline-none focus:ring-2 focus:ring-green-400"
                   required>

            <input id="email"
                   type="email"
                   placeholder="E-mail"
                   class="w-full border p-3 rounded outline-none focus:ring-2 focus:ring-green-400"
                   required>

            <input id="senha"
                   type="password"
                   placeholder="Senha"
                   class="w-full border p-3 rounded outline-none focus:ring-2 focus:ring-green-400"
                   required>

            <!-- TIPO -->
            <select id="tipo"
                    class="w-full border p-3 rounded outline-none focus:ring-2 focus:ring-green-400">

                <option value="PACIENTE">
                    Paciente
                </option>

                <option value="NUTRICIONISTA">
                    Nutricionista
                </option>

            </select>

            <button type="submit"
                    class="w-full bg-green-600 hover:bg-green-700 text-white p-3 rounded font-bold transition">

                Cadastrar

            </button>

        </div>

    </form>

    <div id="mensagem"
         class="hidden mt-4 p-3 rounded text-center font-semibold">
    </div>

    <p class="text-center mt-4 text-sm">

        Já possui conta?

        <a href="/login.html"
           class="text-green-600 font-bold hover:underline">

            Fazer login

        </a>

    </p>

</div>

<script>

    document.getElementById("formCadastro")
        .addEventListener("submit", async function(e) {

            e.preventDefault();

            const usuario = {

                nome: document.getElementById("nome").value,

                email: document.getElementById("email").value,

                senha: document.getElementById("senha").value,

                tipo: document.getElementById("tipo").value
            };

            try {

                const response =
                    await fetch('/api/usuarios/cadastro', {

                        method: 'POST',

                        headers: {
                            'Content-Type': 'application/json'
                        },

                        body: JSON.stringify(usuario)
                    });

                const mensagem =
                    document.getElementById("mensagem");

                if(response.ok) {

                    const resposta =
                        await response.json();

                    mensagem.classList.remove("hidden");

                    mensagem.classList.remove(
                        "bg-red-100",
                        "text-red-700"
                    );

                    mensagem.classList.add(
                        "bg-green-100",
                        "text-green-700"
                    );

                    mensagem.innerText =
                        resposta.mensagem ||
                        "Usuário cadastrado com sucesso!";

                    setTimeout(() => {

                        window.location.href =
                            "/login.html";

                    }, 1500);

                } else {

                    const erro =
                        await response.json();

                    mensagem.classList.remove("hidden");

                    mensagem.classList.remove(
                        "bg-green-100",
                        "text-green-700"
                    );

                    mensagem.classList.add(
                        "bg-red-100",
                        "text-red-700"
                    );

                    mensagem.innerText =
                        erro.erro ||
                        "Erro ao cadastrar usuário.";

                }

            } catch (erro) {

                console.error(erro);

                const mensagem =
                    document.getElementById("mensagem");

                mensagem.classList.remove("hidden");

                mensagem.classList.add(
                    "bg-red-100",
                    "text-red-700"
                );

                mensagem.innerText =
                    "Erro de conexão com o servidor.";
            }

        });

</script>

</body>
</html>
