<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Paciente - NutriApp</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/dist/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="style_paciente.css">
</head>
<body>

<header class="header">
    <div class="logo">
        <i class="fas fa-apple-alt"></i> NutriApp
    </div>
    <button class="btn-sair" onclick="logout()">Sair</button>
</header>

<div class="container">
    <h2 id="boasVindas" style="margin-top: 20px;">Olá, Paciente! 👋</h2>

    <div class="stats-cards">
        <div class="stat-card">
            <i class="fas fa-calendar-check"></i>
            <span>Meta do Dia: 2.200 kcal</span>
        </div>
        <div class="stat-card">
            <i class="fas fa-tint"></i>
            <span>Meta de Água: 2.5L</span>
        </div>
    </div>

    <div id="dietaContainer">
        <p>Carregando sua dieta...</p>
    </div>
</div>

<script>
    window.onload = function() {
        const nome = localStorage.getItem("nomeUsuario");
        if (nome) {
            document.getElementById("boasVindas").innerText = `Olá, ${nome}! 👋`;
        }
        carregarDieta();
    };

    async function carregarDieta() {
        // Garante que o ID seja apenas o número (ex: de "1:1" para "1")
        const pacienteId = localStorage.getItem("usuarioId")?.split(':')[0];
        const container = document.getElementById("dietaContainer");

        function renderizarCards(dados) {
            
        }

        try {
            // Chamada para o seu endpoint Java corrigido
            const response = await fetch(`http://localhost:8080/dietas/paciente/${pacienteId}`);

            if (!response.ok) throw new Error("Erro ao buscar dados");

            const dados = await response.json();
            renderizarCards(dados);

            // CORREÇÃO CRÍTICA: Transforma objeto único em Array para o forEach não quebrar
            const listaDietas = Array.isArray(dados) ? dados : [dados];

            if (listaDietas.length === 0 || !listaDietas[0]) {
                container.innerHTML = "<p>Nenhuma dieta encontrada para este paciente.</p>";
                return;
            }

            listaDietas.forEach(item => {
                // Monta o card usando os campos do seu Model Dieta
                container.innerHTML += `
                    <div class="meal-card">
                        <div class="meal-time">${item.horario || '00:00'}</div>
                        <div class="meal-content">
                            <h3><i class="fas fa-utensils"></i> ${item.refeicaoNome || 'Refeição'}</h3>
                            <p>${item.descricao || 'Sem descrição'}</p>
                            <button class="btn-swap" onclick="abrirModalSubstituicao(${item.id})">
                                <i class="fas fa-sync-alt"></i> Sugerir Substituição
                            </button>
                        </div>
                    </div>`;
            });

        } catch (error) {
            console.error("Erro no carregamento:", error);
            container.innerHTML = "<p>Erro ao carregar dieta. Verifique se o backend está rodando.</p>";
        }
    }

    function abrirModalSubstituicao(dietaId) {
        Swal.fire({
            title: 'Sugerir Substituição',
            input: 'textarea',
            inputLabel: 'O que você gostaria de alterar nesta refeição?',
            showCancelButton: true,
            confirmButtonText: 'Enviar para o Nutri',
            confirmButtonColor: '#28a745',
            cancelButtonText: 'Cancelar'
        }).then((result) => {
            if (result.isConfirmed && result.value) {
                enviarSubstituicao(dietaId, result.value);
            }
        });
    }

    async function enviarSubstituicao(dietaId, texto) {
        const pacienteId = localStorage.getItem("usuarioId");

        const dados = {
            textoPedido: texto,
            dieta: { id: dietaId },
            paciente: { id: parseInt(pacienteId) }
        };

        try {
            const response = await fetch("http://localhost:8080/api/substituicoes", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(dados)
            });

            if (response.ok) {
                Swal.fire('Sucesso!', 'Sua sugestão foi enviada.', 'success');
            }
        } catch (error) {
            console.error("Erro ao enviar:", error);
        }
    }

    function logout() {
        localStorage.clear();
        window.location.href = "login.html";
    }
</script>
</body>
</html>
